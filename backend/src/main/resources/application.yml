server:
  port : 8080
spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/capevents
    username: capevents
    password: root

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  profiles:
    active: dev

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  security:
    jwt:
      secret: "capgemini-pfe-dev-secret-key-very-long"
      access-expiration-minutes: 30
      refresh-expiration-days: 7
    allowed-email-domains:
      - capgemini.com
  cookies:
    refresh-name: capevents_refresh_token

  mail:
    from: noreply@capevents.local
    frontend-base-url: http://localhost:4200


ai:
  base-url: http://127.0.0.1:8001
  service-key: change-me-secret-key
  timeout-seconds: 120