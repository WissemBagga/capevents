<div class="auth-page-simple">
  <div class="auth-card-simple">
    <div class="brand-header">
      <h2>CapEvents</h2>
    </div>
    
    <div class="auth-icon-simple">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    </div>
    
    <h1>Mot de passe oublié</h1>
    <p class="auth-subtitle">Saisissez votre email pour demander une réinitialisation de votre mot de passe.</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="form-group">
            <label for="email">ADRESSE EMAIL</label>
            <div class="input-wrapper">
                <span class="input-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 6L2 7"/></svg>
                </span>
                <input id="email" type="email" formControlName="email" placeholder="votre.email@capgemini.com" />
            </div>
        </div>

        @if (errorMessage) {
            <div class="message-box error">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                <p>{{ errorMessage }}</p>
            </div>
        }

        @if (successMessage) {
            <div class="message-box success">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                <p>{{ successMessage }}</p>
            </div>
        }

        <button type="submit" [disabled]="loading" class="btn-primary">
            {{ loading ? 'Envoi en cours...' : 'Envoyer le lien →' }}
        </button>
    </form>

    <div class="auth-footer-links">
        <a routerLink="/login" class="back-link">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
            Retour à la connexion
        </a>
    </div>
  </div>
</div>
